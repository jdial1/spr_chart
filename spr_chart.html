<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#141414">
    <title>Strategic Petroleum Reserve</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

<div class="app">
    <header class="app-header">
        <div class="header-top">
            <div class="header-title">
                <h1><span class="label-long">Strategic Petroleum Reserve</span><span class="label-short">US SPR</span></h1>
                <p class="app-meta">Weekly crude inventory · EIA WCSSTUS1</p>
            </div>
        </div>
        <div class="header-stats">
            <div class="stat-item">
                <span class="stat-label"><span class="label-long">Current Inventory</span><span class="label-short">Stock</span></span>
                <span class="stat-value" id="stat-current">—</span>
                <span class="stat-sub" id="stat-fill-pct">—</span>
            </div>
            <div class="stat-item">
                <span class="stat-label"><span class="label-long">Days to Floor (Range)</span><span class="label-short">Floor</span></span>
                <span class="stat-value" id="stat-days-range">—</span>
                <span class="stat-sub" id="stat-date-range">—</span>
            </div>
            <div class="stat-item stat-item-velocity">
                <span class="stat-label"><span class="label-long">Drawdown Velocity</span><span class="label-short">Velocity</span></span>
                <span class="stat-value stat-velocity" id="stat-velocity">—</span>
            </div>
        </div>
    </header>

    <section class="panel chart-panel">
        <div class="chart-viewport">
            <svg id="spr-chart" aria-label="SPR stock level chart" role="img"></svg>
        </div>
    </section>

    <section class="panel legend-panel">
        <div class="legend-title">Model Projection Rates</div>
        <div class="legend-scroll">
            <div class="legend-grid" id="projection-legend"></div>
        </div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
